# ── PPO on HalfCheetah (Phase 1: Run by default) ─────────────────────────
algorithm: ppo
policy: MlpPolicy

env:
  id: HalfCheetah-v4:backflip

hyperparameters:
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5

training:
  total_steps: 500_000
  seed: 42
  n_envs: 1
  verbose: 0
  model_path: models/ppo_agent.zip
  log_interval: 1000

evaluation:
  interval: 25_000
  episodes: 5
  video_interval: 100_000
  video_fps: 10

wandb:
  project: aidl-rl-benchmark
  tags: [training, ppo]
