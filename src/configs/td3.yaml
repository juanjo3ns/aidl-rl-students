# ── TD3 on HalfCheetah (continuous control) ─────────────────────────────
algorithm: td3
policy: MlpPolicy

env:
  id: HalfCheetah-v5:run

hyperparameters:
  learning_rate: 3.0e-4
  buffer_size: 300_000
  batch_size: 256
  tau: 0.005
  gamma: 0.99
  train_freq: 1
  gradient_steps: 1
  policy_delay: 2
  target_policy_noise: 0.2
  target_noise_clip: 0.5

training:
  total_steps: 500_000
  seed: 42
  n_envs: 1
  verbose: 0
  model_path: models/td3_agent.zip
  log_interval: 1000

evaluation:
  interval: 25_000
  episodes: 5
  video_interval: 100_000
  video_fps: 10

wandb:
  project: aidl-rl-benchmark
  tags: [training, td3]
