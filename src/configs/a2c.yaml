# ── A2C on HalfCheetah ───────────────────────────────────────────────────
algorithm: a2c
policy: MlpPolicy

env:
  id: HalfCheetah-v5:run

hyperparameters:
  learning_rate: 7.0e-4
  n_steps: 5
  gamma: 0.99
  gae_lambda: 1.0
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  normalize_advantage: false

training:
  total_steps: 500_000
  seed: 42
  n_envs: 1
  verbose: 0
  model_path: models/a2c_agent.zip
  log_interval: 1000

evaluation:
  interval: 25_000
  episodes: 5
  video_interval: 100_000
  video_fps: 10

wandb:
  project: aidl-rl-benchmark
  tags: [training, a2c]
